name: Ralph Loop

on:
  # Manual trigger (for debugging and individual runs)
  workflow_dispatch:
    inputs:
      prd_dir:
        description: 'PRD directory path (e.g., docs/prds/prd-my-feature). Leave empty for Orchestrator auto-detection'
        required: false
        default: ''
      max_iterations:
        description: 'Maximum number of iterations'
        required: false
        default: '10'

  # Scheduled scan (daily at UTC 0:00)
  schedule:
    - cron: '0 0 * * *'

  # Trigger on PRD changes
  push:
    paths:
      - 'docs/prds/**'

# Prevent concurrent runs
concurrency:
  group: ralph-loop
  cancel-in-progress: false

jobs:
  orchestrate:
    if: github.event_name != 'push' || github.ref_name == github.event.repository.default_branch
    runs-on:
      - self-hosted
      - linux
      - ec2
      - claude
      - ralph
    timeout-minutes: 360
    permissions:
      contents: write
      issues: write
      pull-requests: write
    env:
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install agent runtime
        run: bash .github/scripts/install-agent-runtime.sh

      - name: Project bootstrap
        run: bash .github/scripts/setup-project-env.sh

      - name: Configure git identity
        run: |
          git config user.name "Ralph Bot"
          git config user.email "ralph-bot@users.noreply.github.com"

      - name: Run Ralph
        id: ralph
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_PRD_DIR: ${{ github.event.inputs.prd_dir }}
          INPUT_MAX_ITERATIONS: ${{ github.event.inputs.max_iterations }}
        run: |
          set +e
          RALPH_EXIT=0
          if [ -n "$INPUT_PRD_DIR" ]; then
            # workflow_dispatch: Run directly on specified PRD
            source scripts/ralph/prd-helpers.sh
            prd_dir="$INPUT_PRD_DIR"
            target_branch="$(get_prd_branch "$prd_dir")"

            if [ -z "$target_branch" ]; then
              echo "Error: PRD branch is not defined in ${prd_dir}/prd.md"
              RALPH_EXIT=1
            elif ensure_checked_out_branch "$target_branch"; then
              ./scripts/ralph/ralph.sh \
                --tool claude \
                --prd "$prd_dir" \
                "$INPUT_MAX_ITERATIONS"
              RALPH_EXIT=$?
            else
              RALPH_EXIT=$?
            fi
          else
            # schedule/push: Orchestrator auto-detection
            ./scripts/ralph/orchestrator.sh \
              --max-iterations "${INPUT_MAX_ITERATIONS:-10}"
            RALPH_EXIT=$?
          fi
          echo "exit_code=$RALPH_EXIT" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Create PR
        if: steps.ralph.outputs.exit_code == '0' || steps.ralph.outputs.exit_code == '2'
        run: |
          default_branch="${DEFAULT_BRANCH:-main}"
          source scripts/ralph/prd-helpers.sh

          if [ -n "$(git status --porcelain)" ]; then
            echo "Uncommitted changes found. ralph.sh may have forgotten to commit."
            git status
            exit 1
          fi

          current_branch=$(git rev-parse --abbrev-ref HEAD)

          # Skip PR creation on the repository default branch
          if [ "$current_branch" = "$default_branch" ]; then
            echo "On default branch ($default_branch), skipping PR creation"
            exit 0
          fi

          # Skip if PR already exists
          existing_pr=$(gh pr list --head "$current_branch" --state open --json number --jq '.[0].number')
          if [ -n "$existing_pr" ]; then
            echo "Existing PR #$existing_pr found, skipping"
            exit 0
          fi

          # Identify PRD directory (scan prd.md files for matching branch)
          prd_title=""
          for prd_dir in docs/prds/prd-*/; do
            if [ -f "${prd_dir}prd.md" ]; then
              prd_branch=$(get_prd_branch "$prd_dir")
              if [ "$prd_branch" = "$current_branch" ]; then
                prd_title=$(get_prd_title "$prd_dir")
                break
              fi
            fi
          done

          # Generate title
          if [ -n "$prd_title" ]; then
            pr_title="feat: $prd_title"
          else
            pr_title="feat: changes from $current_branch"
          fi

          # Generate body (summary from commit log)
          commit_summary="$(git log "origin/$default_branch"..HEAD --pretty=format:'- %s' 2>/dev/null || echo '(Unable to retrieve commit log)')"
          pr_body=$'## Changes\n\n'"$commit_summary"$'\n\n---\n*This PR was automatically created by Ralph Loop*'

          pr_create_output="$(gh pr create \
            --title "$pr_title" \
            --body "$pr_body" \
            --base "$default_branch" \
            --head "$current_branch" 2>&1)" || pr_create_status=$?
          pr_create_status="${pr_create_status:-0}"

          if [ "$pr_create_status" -eq 0 ]; then
            echo "PR created: $pr_create_output"
          elif printf '%s' "$pr_create_output" | grep -q "Resource not accessible by integration"; then
            manual_pr_url="https://github.com/${GITHUB_REPOSITORY}/compare/${default_branch}...${current_branch}?expand=1"
            echo "::warning::GitHub Actions pushed branch ${current_branch}, but could not create a pull request with GITHUB_TOKEN."
            echo "::warning::Enable 'Allow GitHub Actions to create and approve pull requests' in Settings > Actions > General, or create the PR manually: ${manual_pr_url}"
          else
            echo "$pr_create_output" >&2
            exit "$pr_create_status"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check Ralph result
        if: steps.ralph.outputs.exit_code == '2'
        run: |
          echo "::notice::Ralph reached max iterations with work remaining. A later run can continue from the updated PRD state."

      - name: Fail on Ralph runtime error
        if: steps.ralph.outputs.exit_code != '0' && steps.ralph.outputs.exit_code != '2'
        env:
          RALPH_EXIT_CODE: ${{ steps.ralph.outputs.exit_code }}
        run: |
          echo "Ralph exited with code $RALPH_EXIT_CODE (max iterations reached or abnormal exit)"
          exit 1
