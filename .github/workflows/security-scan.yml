name: Security Scan

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"
  push:
    branches:
      - main
    paths:
      - "package.json"
      - "pnpm-lock.yaml"
      - "infra/package.json"
      - "infra/pnpm-lock.yaml"
      - ".github/workflows/security-scan.yml"
  pull_request:
    paths:
      - "package.json"
      - "pnpm-lock.yaml"
      - "infra/package.json"
      - "infra/pnpm-lock.yaml"
      - ".github/workflows/security-scan.yml"

concurrency:
  group: security-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pnpm-audit:
    name: pnpm audit (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: root
            package_dir: .
            lockfile: pnpm-lock.yaml
          - name: infra
            package_dir: infra
            lockfile: infra/pnpm-lock.yaml
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for lockfile
        id: check
        run: |
          if [ -f "${{ matrix.lockfile }}" ]; then
            echo "has_lockfile=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: steps.check.outputs.has_lockfile == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node.js
        if: steps.check.outputs.has_lockfile == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: ${{ matrix.lockfile }}

      - name: Install dependencies
        if: steps.check.outputs.has_lockfile == 'true'
        run: pnpm install --frozen-lockfile --ignore-scripts
        working-directory: ${{ matrix.package_dir }}

      - name: Run pnpm audit
        if: steps.check.outputs.has_lockfile == 'true'
        run: pnpm audit --audit-level=high
        working-directory: ${{ matrix.package_dir }}

  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Semgrep
        run: python -m pip install --upgrade pip semgrep

      - name: Run Semgrep
        run: semgrep scan --config p/default --config p/github-actions --error .

  snyk:
    name: Snyk (${{ matrix.name }})
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: root
            package_dir: .
            lockfile: pnpm-lock.yaml
          - name: infra
            package_dir: infra
            lockfile: infra/pnpm-lock.yaml
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for lockfile
        id: check
        run: |
          if [ -f "${{ matrix.lockfile }}" ]; then
            echo "has_lockfile=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Explain skipped Snyk scan
        if: ${{ env.SNYK_TOKEN == '' }}
        run: |
          echo "Snyk scan skipped because SNYK_TOKEN is not configured."
          echo "Add SNYK_TOKEN to GitHub Actions secrets to enable the Snyk job."

      - name: Setup pnpm
        if: ${{ env.SNYK_TOKEN != '' && steps.check.outputs.has_lockfile == 'true' }}
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node.js
        if: ${{ env.SNYK_TOKEN != '' && steps.check.outputs.has_lockfile == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: ${{ matrix.lockfile }}

      - name: Install dependencies
        if: ${{ env.SNYK_TOKEN != '' && steps.check.outputs.has_lockfile == 'true' }}
        run: pnpm install --frozen-lockfile --ignore-scripts
        working-directory: ${{ matrix.package_dir }}

      - name: Run Snyk test
        if: ${{ env.SNYK_TOKEN != '' && steps.check.outputs.has_lockfile == 'true' }}
        run: pnpm dlx snyk test --severity-threshold=high
        working-directory: ${{ matrix.package_dir }}
