name: Security Scan

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"
  push:
    branches:
      - main
    paths:
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/security-scan.yml"
  pull_request:
    paths:
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/security-scan.yml"

concurrency:
  group: security-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for lockfile
        id: check
        run: |
          if [ -f package-lock.json ]; then
            echo "has_lockfile=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.check.outputs.has_lockfile == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        if: steps.check.outputs.has_lockfile == 'true'
        run: npm ci --ignore-scripts

      - name: Run npm audit
        if: steps.check.outputs.has_lockfile == 'true'
        run: npm audit --audit-level=high

  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Semgrep
        run: python -m pip install --upgrade pip semgrep

      - name: Run Semgrep
        run: semgrep scan --config p/default --config p/github-actions --error .

  snyk:
    name: Snyk
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for lockfile
        id: check
        run: |
          if [ -f package-lock.json ]; then
            echo "has_lockfile=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Explain skipped Snyk scan
        if: ${{ env.SNYK_TOKEN == '' }}
        run: |
          echo "Snyk scan skipped because SNYK_TOKEN is not configured."
          echo "Add SNYK_TOKEN to GitHub Actions secrets to enable the Snyk job."

      - name: Setup Node.js
        if: ${{ env.SNYK_TOKEN != '' && steps.check.outputs.has_lockfile == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        if: ${{ env.SNYK_TOKEN != '' && steps.check.outputs.has_lockfile == 'true' }}
        run: npm ci --ignore-scripts

      - name: Install Snyk CLI
        if: ${{ env.SNYK_TOKEN != '' && steps.check.outputs.has_lockfile == 'true' }}
        run: npm install --global snyk

      - name: Run Snyk test
        if: ${{ env.SNYK_TOKEN != '' && steps.check.outputs.has_lockfile == 'true' }}
        run: snyk test --severity-threshold=high
